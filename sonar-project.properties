# --- Project ---
sonar.projectKey=orquestra-frontend
sonar.projectName=Orquestra Frontend
sonar.projectVersion=1.0

# --- Server ---
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}

# --- Source code ---
sonar.sources=src
sonar.sourceEncoding=UTF-8

# --- Tests ---
sonar.tests=src/tests
sonar.test.inclusions=src/tests/**/*.test.ts

# --- Coverage ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Exclusions ---
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  src/tests/**,\
  src/**/*.d.ts

# --- Coverage exclusions ---
sonar.coverage.exclusions=\
  src/main.ts,\
  src/router/**,\
  src/tests/**,\
  src/**/*.d.ts